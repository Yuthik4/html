<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div style="display: grid; grid-template-columns: 100px 100px">
      <div style="background-color: gray">1</div>
      <div style="background-color: blue; color: white">2</div>
    </div>
    <div
      style="
        display: grid;
        grid-template-columns: 100px 100px 100px;
        margin-top: 30px;
      "
    >
      <div style="background-color: gray">1</div>
      <div style="background-color: blue; color: white">2</div>
      <div style="background-color: gray">3</div>
      <div style="background-color: blue; color: white">4</div>
    </div>

    <div
      style="display: grid; grid-template-columns: 100px 1fr; margin-top: 30px"
    >
      <div style="background-color: gray">1</div>
      <div style="background-color: blue; color: white">2</div>
    </div>
    <div
      style="
        display: grid;
        grid-template-columns: 100px 1fr 2fr;
        margin-top: 30px;
      "
    >
      <div style="background-color: gray">1</div>
      <div style="background-color: blue; color: white">2</div>
      <div style="background-color: gray">3</div>
    </div>
    <div
      style="
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        margin-top: 30px;
        gap: 40px 20px;
      "
    >
      <div style="background-color: gray; height: 200px">1</div>
      <div style="background-color: blue; height: 200px; color: white">2</div>
      <div style="background-color: gray; height: 200px">3</div>
      <div style="background-color: blue; height: 200px">1</div>
      <div style="background-color: gray; height: 200px; color: white">2</div>
      <div style="background-color: blue; height: 200px">3</div>
    </div>
  </body>
</html>
