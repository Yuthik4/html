<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BLOCK USE GARA</title>
    <style>
      #fname,
      #lname {
        padding: 8px 16px;
        width: 80px;
        border-radius: 10px;
        margin: 2px;
        font-size: medium;
        border: 1px solid gray;
      }
    </style>
  </head>
  <body>
    <input type="text" id="fname" placeholder="First name" /><input
      type="text"
      id="lname"
      placeholder="last name"
    /><input type="text" id="mail" placeholder="Email" />
    <button class="btn">Sign Up</button>
    <br /><br /><br /><br />
    <p>Request a ride now</p>
    <input type="text" id="pickup" placeholder="Enter pickup location" /><input
      type="text"
      id="destination"
      placeholder="Enter destination"
    />
    <button class="now">Request now</button>
    <button class="later">Schedule for later</button>
  </body>
</html>
