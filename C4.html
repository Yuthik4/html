<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      a {
        padding: 5px;
      }
      #h4 {
        padding: 7px 5px;
      }
      #i4 {
        background-color: green;
        color: white;
        border: none;
        font-size: 18px;
        padding: 10px 16px;
        cursor: pointer;
        transition: padding 0.5s;
      }
      #i4:hover {
        padding: 20px 32px;
      }
      #j4 {
        background-color: green;
        color: white;
        border: none;
        font-size: 18px;
        padding: 10px 16px;
        cursor: pointer;
        box-shadow: 2px 2px 4px black;
      }
      #j4:active {
        box-shadow: 0 0 0 white;
        transform: translate(4px, 4px);
      }
      #k4 {
        background-color: green;
        color: white;
        border: none;
        font-size: 18px;
        padding: 10px 16px;
        cursor: pointer;
        margin: 0px 20px;
      }
      #k4:hover {
        padding: 10px 36px;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <button id="h4">Back</button>

    ><a href="">5</a>

    <br /><br /><br /><br />
